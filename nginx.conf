events {
    worker_connections 1024;
}

http {
    # Use Docker's internal DNS resolver with a short TTL so upstream IPs
    # are re-resolved after container restarts rather than cached forever.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        location /dh/service/ {
            set $us_service http://dhservice:8000;
            rewrite ^/dh/service/(.*) /$1 break;
            proxy_pass $us_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/identity/ {
            set $us_identity http://dhidentity:8000;
            rewrite ^/dh/identity/(.*) /$1 break;
            proxy_pass $us_identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/authorizations/ {
            set $us_authz http://dhauthorizations:8000;
            rewrite ^/dh/authorizations/(.*) /$1 break;
            proxy_pass $us_authz;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/access/ {
            set $us_access http://dhaccess:8000;
            rewrite ^/dh/access/(.*) /$1 break;
            proxy_pass $us_access;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/status/ {
            set $us_status http://dhstatus:8000;
            rewrite ^/dh/status/(.*) /$1 break;
            proxy_pass $us_status;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/dh2rfid/ {
            set $us_dh2rfid http://dh2rfid:8000;
            rewrite ^/dh/dh2rfid/(.*) /$1 break;
            proxy_pass $us_dh2rfid;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/dh2ad/ {
            set $us_dh2ad http://dh2ad:8000;
            rewrite ^/dh/dh2ad/(.*) /$1 break;
            proxy_pass $us_dh2ad;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/wf2dh/ {
            set $us_wf2dh http://wf2dh:8000;
            rewrite ^/dh/wf2dh/(.*) /$1 break;
            proxy_pass $us_wf2dh;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/email/ {
            set $us_email http://dh2mg:8000;
            rewrite ^/dh/email/(.*) /$1 break;
            proxy_pass $us_email;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /dh/equipment/ {
            set $us_equipment http://dhequipment:8000;
            rewrite ^/dh/equipment/(.*) /$1 break;
            proxy_pass $us_equipment;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 260m;
        }

        location /files/ {
            proxy_pass http://rustfs:9000/;
            proxy_set_header Host rustfs:9000;
            client_max_body_size 260m;
        }
        
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
